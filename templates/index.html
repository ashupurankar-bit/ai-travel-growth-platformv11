<!DOCTYPE html>
<html>
<head>
<title>AI Travel Assistant</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
}

#chatbox{
width:500px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#messages{
height:400px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

.user{
color:blue;
margin-bottom:5px;
}

.bot{
color:green;
margin-bottom:10px;
}

input{
width:80%;
padding:10px;
}

button{
padding:10px;
}

</style>

</head>

<body>

<div id="chatbox">

<h2>AI Travel Assistant</h2>

<div id="messages"></div>

<input id="message" placeholder="Ask about flights, hotels, or trips..." />

<button onclick="send()">Send</button>

</div>

<script>

async function send(){

let msg=document.getElementById("message").value;

document.getElementById("messages").innerHTML+=
"<div class='user'>You: "+msg+"</div>";

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

let data=await res.json();

document.getElementById("messages").innerHTML+=
"<div class='bot'>AI: "+data.reply+"</div>";

document.getElementById("message").value="";

}

</script>

</body>

</html>
